<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Backlog Tinder</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #app-container { width: 100%; max-width: 450px; text-align: center; }
        .card { background-color: #1e1e1e; border-radius: 15px; padding: 40px 20px; margin: 20px 0; box-shadow: 0 10px 20px rgba(0,0,0,0.5); min-height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: transform 0.2s; }
        .card h2 { margin: 0 0 15px 0; font-size: 1.5rem; word-wrap: break-word; }
        
        .tags { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .tag { padding: 5px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; display: none; }
        .tag.visible { display: block; }
        .tag.playtime { background-color: #333; color: #fff; border: 1px solid #777; }
        .tag.Steam { background-color: #1b2838; color: #66c0f4; border: 1px solid #66c0f4; }
        .tag.Epic { background-color: #2a2a2a; color: #fff; border: 1px solid #fff; }
        .tag.PlayStation { background-color: #003791; color: #fff; border: 1px solid #0072ce; }
        .tag.Xbox { background-color: #107c10; color: #fff; border: 1px solid #5dc21e; }
        .tag.GOG { background-color: #5c1b5e; color: #f375f5; border: 1px solid #f375f5; }
        .tag.other { background-color: #444; color: #ddd; border: 1px solid #888; }

        .buttons { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; color: white; transition: opacity 0.2s; }
        button:hover { opacity: 0.8; }
        #btn-done { background-color: #4caf50; }
        #btn-backlog { background-color: #ff9800; }
        #btn-skip { background-color: #f44336; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .controls button, .controls label { background-color: #333; padding: 10px; border-radius: 5px; text-align: center; cursor: pointer; font-size: 0.9rem; margin: 0; box-sizing: border-box;}
        input[type="file"] { display: none; }
        #stats { display: flex; justify-content: space-between; font-size: 0.9rem; color: #aaaaaa; margin-bottom: 10px; }
        .empty-state { color: #888; font-style: italic; }
    </style>
</head>
<body>

<div id="app-container">
    <h1>Backlog Tracker</h1>
    <div id="stats">
        <span id="stat-queue">Queue: 0</span>
        <span id="stat-done">Done: 0</span>
        <span id="stat-backlog">Backlogged: 0</span>
    </div>

    <div class="card" id="card">
        <h2 id="game-title">Import your CSV to start!</h2>
        <div class="tags" id="game-tags">
            <span id="tag-platform" class="tag"></span>
            <span id="tag-playtime" class="tag playtime"></span>
        </div>
    </div>

    <div class="buttons">
        <button id="btn-skip" onclick="handleAction('skip')">Not Done<br>(Rotate)</button>
        <button id="btn-backlog" onclick="handleAction('backlog')">Backlog<br>(Save)</button>
        <button id="btn-done" onclick="handleAction('done')">Done<br>(Remove)</button>
    </div>

    <div class="controls">
        <label for="csv-upload">Import Playnite CSV</label>
        <input type="file" id="csv-upload" accept=".csv" onchange="importCSV(event)">
        <button onclick="undoAction()">Undo Last Action</button>
        <button onclick="exportJSON()">Backup JSON</button>
        <button onclick="exportCSV()">Export Results CSV</button>
        <button onclick="clearData()" style="background-color: #551111; grid-column: span 2;">Reset All Data</button>
    </div>
</div>

<script>
    let queue = JSON.parse(localStorage.getItem('gameQueue')) || [];
    let history = JSON.parse(localStorage.getItem('gameHistory')) || [];
    let stats = JSON.parse(localStorage.getItem('gameStats')) || { done: 0, backlogged: 0 };

    function updateUI() {
        document.getElementById('stat-queue').innerText = `Queue: ${queue.length}`;
        document.getElementById('stat-done').innerText = `Done: ${stats.done}`;
        document.getElementById('stat-backlog').innerText = `Backlog: ${stats.backlogged}`;

        const titleEl = document.getElementById('game-title');
        const platformTag = document.getElementById('tag-platform');
        const playtimeTag = document.getElementById('tag-playtime');

        if (queue.length > 0) {
            const game = queue[0];
            titleEl.innerText = game.name;
            titleEl.classList.remove('empty-state');

            if (game.platform) {
                platformTag.innerText = game.platform;
                platformTag.className = 'tag visible ' + (['Steam', 'Epic', 'PlayStation', 'Xbox', 'GOG'].includes(game.platform) ? game.platform : 'other');
            } else {
                platformTag.className = 'tag';
            }

            if (game.playtime !== undefined && game.playtime !== null) {
                playtimeTag.innerText = `${game.playtime} hrs`;
                playtimeTag.classList.add('visible');
            } else {
                playtimeTag.classList.remove('visible');
            }
        } else {
            titleEl.innerText = "You're all caught up! Import more games.";
            titleEl.classList.add('empty-state');
            platformTag.className = 'tag';
            playtimeTag.classList.remove('visible');
        }
        saveData();
    }

    function handleAction(action) {
        if (queue.length === 0) return;
        
        let currentGame = queue.shift();
        history.push({ game: currentGame, action: action });

        if (action === 'skip') {
            queue.push(currentGame); 
        } else if (action === 'backlog') {
            stats.backlogged++; 
        } else if (action === 'done') {
            stats.done++; 
        }
        updateUI();
    }

    function undoAction() {
        if (history.length === 0) return alert("Nothing to undo!");
        
        let lastEvent = history.pop();
        
        if (lastEvent.action === 'skip') {
            queue.pop(); 
        } else if (lastEvent.action === 'backlog') {
            stats.backlogged--;
        } else if (lastEvent.action === 'done') {
            stats.done--;
        }

        queue.unshift(lastEvent.game);
        updateUI();
    }

    function importCSV(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const text = e.target.result;
            const lines = text.split('\n');
            let addedCount = 0;

            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                // Matches format: "Name","Source","Platforms","Status","PlaytimeHours"
                const match = lines[i].match(/^"([^"]+)","([^"]*)","([^"]*)","([^"]*)","([^"]*)"/); 
                if (match) {
                    const gameName = match[1];
                    const gameSource = match[2];
                    const gamePlaytime = match[5];
                    
                    if (!queue.some(g => g.name === gameName)) {
                        queue.push({ 
                            name: gameName, 
                            platform: gameSource || 'Unknown', 
                            playtime: parseFloat(gamePlaytime) || 0 
                        });
                        addedCount++;
                    }
                }
            }
            alert(`Successfully imported ${addedCount} new games!`);
            updateUI();
        };
        reader.readAsText(file);
    }

    function exportJSON() {
        const data = { queue, history, stats };
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
        triggerDownload(blob, 'backlog_tracker_backup.json');
    }

    function exportCSV() {
        if (history.length === 0) return alert("No history to export.");
        let csvContent = "Name,Decision,Platform,PlaytimeHours\n";
        history.forEach(item => {
            if (item.action !== 'skip') {
                csvContent += `"${item.game.name}","${item.action}","${item.game.platform}","${item.game.playtime}"\n`;
            }
        });
        const blob = new Blob([csvContent], {type: "text/csv"});
        triggerDownload(blob, 'backlog_results.csv');
    }

    function triggerDownload(blob, filename) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
    }

    function clearData() {
        if(confirm("Are you sure you want to delete all progress?")) {
            queue = [];
            history = [];
            stats = { done: 0, backlogged: 0 };
            updateUI();
        }
    }

    function saveData() {
        localStorage.setItem('gameQueue', JSON.stringify(queue));
        localStorage.setItem('gameHistory', JSON.stringify(history));
        localStorage.setItem('gameStats', JSON.stringify(stats));
    }

    updateUI();
</script>

</body>
</html>
