<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Backlog Tracker</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --done: #10b981;
            --backlog: #f59e0b;
            --skip: #ef4444;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navigation */
        nav {
            background-color: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #334155;
        }

        nav button {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            padding: 5px 10px;
            transition: color 0.2s;
        }

        nav button.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        nav button:hover { color: var(--text-main); }

        /* Container & Tabs */
        .container {
            flex: 1;
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            padding: 20px;
            box-sizing: border-box;
            display: none;
        }
        .container.active { display: flex; flex-direction: column; }

        /* Swipe View */
        #swipe-view { align-items: center; justify-content: center; }
        
        .card {
            background-color: var(--card-bg);
            border: 1px solid #334155;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            height: 500px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .card-image {
            height: 60%;
            width: 100%;
            background-color: #1e293b;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            position: relative;
        }

        .card-image::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 50%;
            background: linear-gradient(to top, var(--card-bg), transparent);
        }

        .card-content {
            padding: 20px;
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card-title { font-size: 1.8rem; margin: 0 0 15px 0; font-weight: 800; line-height: 1.2; }

        .tags { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .tag { padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; background: #334155; }
        .tag.Steam { background: #1b2838; color: #66c0f4; }
        .tag.PlayStation { background: #003791; color: #fff; }
        .tag.Xbox { background: #107c10; color: #fff; }
        .tag.Epic { background: #fff; color: #000; }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            width: 100%;
            max-width: 400px;
        }

        .btn-action {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }
        .btn-action span { font-size: 0.6rem; margin-top: 4px; font-weight: bold; text-transform: uppercase; }
        .btn-action:active { transform: scale(0.9); }
        .btn-skip { background-color: var(--skip); }
        .btn-backlog { background-color: var(--backlog); }
        .btn-done { background-color: var(--done); }

        .undo-btn { margin-top: 20px; background: none; border: none; color: var(--text-muted); cursor: pointer; text-decoration: underline; }

        /* Lists View */
        .list-header { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .list-header button { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1rem; }
        .list-header button.active { color: white; font-weight: bold; }
        
        .list-items { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; max-height: 70vh; padding-right: 5px; }
        .list-item { background: #1e293b; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        .list-item-title { font-weight: bold; }
        .list-item-meta { font-size: 0.8rem; color: var(--text-muted); }

        /* Settings View */
        .setting-group { background: #1e293b; padding: 20px; border-radius: 10px; margin-bottom: 15px; }
        .setting-group h3 { margin-top: 0; }
        input[type="text"], input[type="file"] { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 10px; box-sizing: border-box; }
        .btn-block { display: block; width: 100%; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-bottom: 10px; background: var(--accent); color: white; }
        .btn-danger { background: var(--skip); }
        .hint { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 10px; display: block; }
        a { color: var(--accent); }

    </style>
</head>
<body>

<nav>
    <button onclick="switchTab('swipe')" class="active" id="tab-swipe">Swipe</button>
    <button onclick="switchTab('lists')" id="tab-lists">Lists</button>
    <button onclick="switchTab('settings')" id="tab-settings">Settings</button>
</nav>

<div id="swipe-view" class="container active">
    <div class="card" id="game-card">
        <div class="card-image" id="card-img">No Image Available</div>
        <div class="card-content">
            <h2 class="card-title" id="card-title">Upload CSV to begin</h2>
            <div class="tags" id="card-tags"></div>
        </div>
    </div>
    
    <div class="action-buttons">
        <button class="btn-action btn-skip" onclick="handleAction('skip')">↻<span>Rotate</span></button>
        <button class="btn-action btn-backlog" onclick="handleAction('backlog')">▼<span>Save</span></button>
        <button class="btn-action btn-done" onclick="handleAction('done')">✓<span>Done</span></button>
    </div>
    <button class="undo-btn" onclick="undoAction()">Undo Last Action</button>
</div>

<div id="lists-view" class="container">
    <div class="list-header">
        <button onclick="switchSubList('queue')" id="sub-queue" class="active">Queue (0)</button>
        <button onclick="switchSubList('backlog')" id="sub-backlog">Backlog (0)</button>
        <button onclick="switchSubList('done')" id="sub-done">Done (0)</button>
    </div>
    <div class="list-items" id="list-container">
        </div>
</div>

<div id="settings-view" class="container">
    <div class="setting-group">
        <h3>API Configuration</h3>
        <label class="hint">Get a free API key from <a href="https://rawg.io/apidocs" target="_blank">RAWG.io</a> to fetch game covers automatically.</label>
        <input type="text" id="rawg-key" placeholder="Enter RAWG API Key here...">
        <button class="btn-block" onclick="saveApiKey()">Save API Key</button>
    </div>

    <div class="setting-group">
        <h3>Data Import / Export</h3>
        <input type="file" id="csv-upload" accept=".csv" style="display: none;" onchange="importCSV(event)">
        <button class="btn-block" onclick="document.getElementById('csv-upload').click()">Import Playnite CSV</button>
        <button class="btn-block" onclick="exportCSV()" style="background: #334155;">Export Results CSV</button>
        <button class="btn-block" onclick="exportJSON()" style="background: #334155;">Backup Data (JSON)</button>
    </div>

    <div class="setting-group">
        <h3>Danger Zone</h3>
        <button class="btn-block btn-danger" onclick="clearData()">Reset All Data</button>
    </div>
</div>

<script>
    // State
    let queue = JSON.parse(localStorage.getItem('gameQueue')) || [];
    let doneList = JSON.parse(localStorage.getItem('gameDone')) || [];
    let backlogList = JSON.parse(localStorage.getItem('gameBacklog')) || [];
    let history = JSON.parse(localStorage.getItem('gameHistory')) || [];
    let rawgKey = localStorage.getItem('rawgApiKey') || '';
    
    let currentSubList = 'queue';

    // Init
    document.getElementById('rawg-key').value = rawgKey;
    updateUI();

    // Tabs logic
    function switchTab(tabId) {
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        
        document.getElementById(`${tabId}-view`).classList.add('active');
        document.getElementById(`tab-${tabId}`).classList.add('active');

        if(tabId === 'lists') renderList();
    }

    function switchSubList(listName) {
        currentSubList = listName;
        document.querySelectorAll('.list-header button').forEach(b => b.classList.remove('active'));
        document.getElementById(`sub-${listName}`).classList.add('active');
        renderList();
    }

    // UI Updates
    async function updateUI() {
        document.getElementById('sub-queue').innerText = `Queue (${queue.length})`;
        document.getElementById('sub-backlog').innerText = `Backlog (${backlogList.length})`;
        document.getElementById('sub-done').innerText = `Done (${doneList.length})`;

        const titleEl = document.getElementById('card-title');
        const imgEl = document.getElementById('card-img');
        const tagsEl = document.getElementById('card-tags');

        if (queue.length > 0) {
            const game = queue[0];
            titleEl.innerText = game.name;
            
            // Tags
            tagsEl.innerHTML = '';
            if(game.platform) tagsEl.innerHTML += `<span class="tag ${game.platform}">${game.platform}</span>`;
            if(game.playtime > 0) tagsEl.innerHTML += `<span class="tag">${game.playtime} hrs</span>`;

            // Fetch Image
            imgEl.style.backgroundImage = 'none';
            imgEl.innerText = 'Loading art...';
            
            if (rawgKey) {
                const imageUrl = await fetchGameArt(game.name);
                if (imageUrl) {
                    imgEl.style.backgroundImage = `url('${imageUrl}')`;
                    imgEl.innerText = '';
                } else {
                    imgEl.innerText = 'No Art Found';
                }
            } else {
                imgEl.innerText = 'Add RAWG Key in Settings for Art';
            }

        } else {
            titleEl.innerText = "Queue Empty! Import CSV in Settings.";
            tagsEl.innerHTML = '';
            imgEl.style.backgroundImage = 'none';
            imgEl.innerText = '';
        }
        
        saveData();
    }

    async function fetchGameArt(gameName) {
        try {
            // Clean name for better search results
            const searchName = encodeURIComponent(gameName.replace(/[:\-]/g, ' '));
            const response = await fetch(`https://api.rawg.io/api/games?key=${rawgKey}&search=${searchName}&page_size=1`);
            const data = await response.json();
            if (data.results && data.results.length > 0) {
                return data.results[0].background_image;
            }
        } catch (e) {
            console.error("Failed to fetch image", e);
        }
        return null;
    }

    // Actions
    function handleAction(action) {
        if (queue.length === 0) return;
        let currentGame = queue.shift();
        history.push({ game: currentGame, action: action });

        if (action === 'skip') {
            queue.push(currentGame); 
        } else if (action === 'backlog') {
            backlogList.push(currentGame);
        } else if (action === 'done') {
            doneList.push(currentGame);
        }
        updateUI();
    }

    function undoAction() {
        if (history.length === 0) return alert("Nothing to undo!");
        let lastEvent = history.pop();
        
        if (lastEvent.action === 'skip') {
            queue.pop(); 
        } else if (lastEvent.action === 'backlog') {
            backlogList.pop();
        } else if (lastEvent.action === 'done') {
            doneList.pop();
        }

        queue.unshift(lastEvent.game);
        updateUI();
    }

    // List Rendering
    function renderList() {
        const container = document.getElementById('list-container');
        container.innerHTML = '';
        
        let targetList = queue;
        if(currentSubList === 'backlog') targetList = backlogList;
        if(currentSubList === 'done') targetList = doneList;

        if (targetList.length === 0) {
            container.innerHTML = '<div class="list-item" style="justify-content:center; color: #94a3b8;">List is empty</div>';
            return;
        }

        targetList.forEach(game => {
            container.innerHTML += `
                <div class="list-item">
                    <div>
                        <div class="list-item-title">${game.name}</div>
                        <div class="list-item-meta">${game.platform} • ${game.playtime} hrs</div>
                    </div>
                </div>
            `;
        });
    }

    // Data Management
    function importCSV(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const text = e.target.result;
            const lines = text.split('\n');
            let addedCount = 0;

            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const match = lines[i].match(/^"([^"]+)","([^"]*)","([^"]*)","([^"]*)","([^"]*)"/); 
                if (match) {
                    const gameName = match[1];
                    const gameSource = match[2];
                    const gamePlaytime = match[5];
                    
                    const isDupe = [...queue, ...backlogList, ...doneList].some(g => g.name === gameName);
                    
                    if (!isDupe) {
                        queue.push({ 
                            name: gameName, 
                            platform: gameSource || 'Unknown', 
                            playtime: parseFloat(gamePlaytime) || 0 
                        });
                        addedCount++;
                    }
                }
            }
            alert(`Imported ${addedCount} new games!`);
            updateUI();
            switchTab('swipe');
        };
        reader.readAsText(file);
    }

    function saveApiKey() {
        rawgKey = document.getElementById('rawg-key').value.trim();
        localStorage.setItem('rawgApiKey', rawgKey);
        alert("API Key Saved! The swipe view will now try to load images.");
        updateUI();
    }

    function exportJSON() {
        const data = { queue, doneList, backlogList, history };
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
        triggerDownload(blob, 'backlog_tracker_backup.json');
    }

    function exportCSV() {
        let csvContent = "Name,Decision,Platform,PlaytimeHours\n";
        
        doneList.forEach(g => csvContent += `"${g.name}","Done","${g.platform}","${g.playtime}"\n`);
        backlogList.forEach(g => csvContent += `"${g.name}","Backlog","${g.platform}","${g.playtime}"\n`);
        queue.forEach(g => csvContent += `"${g.name}","Queue","${g.platform}","${g.playtime}"\n`);

        const blob = new Blob([csvContent], {type: "text/csv"});
        triggerDownload(blob, 'backlog_results.csv');
    }

    function triggerDownload(blob, filename) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
    }

    function clearData() {
        if(confirm("Are you sure you want to delete all progress? This cannot be undone.")) {
            queue = [];
            doneList = [];
            backlogList = [];
            history = [];
            updateUI();
        }
    }

    function saveData() {
        localStorage.setItem('gameQueue', JSON.stringify(queue));
        localStorage.setItem('gameDone', JSON.stringify(doneList));
        localStorage.setItem('gameBacklog', JSON.stringify(backlogList));
        localStorage.setItem('gameHistory', JSON.stringify(history));
    }
</script>

</body>
</html>
</head>
<body>

<div id="app-container">
    <h1>Backlog Tracker</h1>
    <div id="stats">
        <span id="stat-queue">Queue: 0</span>
        <span id="stat-done">Done: 0</span>
        <span id="stat-backlog">Backlogged: 0</span>
    </div>

    <div class="card" id="card">
        <h2 id="game-title">Import your CSV to start!</h2>
        <div class="tags" id="game-tags">
            <span id="tag-platform" class="tag"></span>
            <span id="tag-playtime" class="tag playtime"></span>
        </div>
    </div>

    <div class="buttons">
        <button id="btn-skip" onclick="handleAction('skip')">Not Done<br>(Rotate)</button>
        <button id="btn-backlog" onclick="handleAction('backlog')">Backlog<br>(Save)</button>
        <button id="btn-done" onclick="handleAction('done')">Done<br>(Remove)</button>
    </div>

    <div class="controls">
        <label for="csv-upload">Import Playnite CSV</label>
        <input type="file" id="csv-upload" accept=".csv" onchange="importCSV(event)">
        <button onclick="undoAction()">Undo Last Action</button>
        <button onclick="exportJSON()">Backup JSON</button>
        <button onclick="exportCSV()">Export Results CSV</button>
        <button onclick="clearData()" style="background-color: #551111; grid-column: span 2;">Reset All Data</button>
    </div>
</div>

<script>
    let queue = JSON.parse(localStorage.getItem('gameQueue')) || [];
    let history = JSON.parse(localStorage.getItem('gameHistory')) || [];
    let stats = JSON.parse(localStorage.getItem('gameStats')) || { done: 0, backlogged: 0 };

    function updateUI() {
        document.getElementById('stat-queue').innerText = `Queue: ${queue.length}`;
        document.getElementById('stat-done').innerText = `Done: ${stats.done}`;
        document.getElementById('stat-backlog').innerText = `Backlog: ${stats.backlogged}`;

        const titleEl = document.getElementById('game-title');
        const platformTag = document.getElementById('tag-platform');
        const playtimeTag = document.getElementById('tag-playtime');

        if (queue.length > 0) {
            const game = queue[0];
            titleEl.innerText = game.name;
            titleEl.classList.remove('empty-state');

            if (game.platform) {
                platformTag.innerText = game.platform;
                platformTag.className = 'tag visible ' + (['Steam', 'Epic', 'PlayStation', 'Xbox', 'GOG'].includes(game.platform) ? game.platform : 'other');
            } else {
                platformTag.className = 'tag';
            }

            if (game.playtime !== undefined && game.playtime !== null) {
                playtimeTag.innerText = `${game.playtime} hrs`;
                playtimeTag.classList.add('visible');
            } else {
                playtimeTag.classList.remove('visible');
            }
        } else {
            titleEl.innerText = "You're all caught up! Import more games.";
            titleEl.classList.add('empty-state');
            platformTag.className = 'tag';
            playtimeTag.classList.remove('visible');
        }
        saveData();
    }

    function handleAction(action) {
        if (queue.length === 0) return;
        
        let currentGame = queue.shift();
        history.push({ game: currentGame, action: action });

        if (action === 'skip') {
            queue.push(currentGame); 
        } else if (action === 'backlog') {
            stats.backlogged++; 
        } else if (action === 'done') {
            stats.done++; 
        }
        updateUI();
    }

    function undoAction() {
        if (history.length === 0) return alert("Nothing to undo!");
        
        let lastEvent = history.pop();
        
        if (lastEvent.action === 'skip') {
            queue.pop(); 
        } else if (lastEvent.action === 'backlog') {
            stats.backlogged--;
        } else if (lastEvent.action === 'done') {
            stats.done--;
        }

        queue.unshift(lastEvent.game);
        updateUI();
    }

    function importCSV(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const text = e.target.result;
            const lines = text.split('\n');
            let addedCount = 0;

            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                // Matches format: "Name","Source","Platforms","Status","PlaytimeHours"
                const match = lines[i].match(/^"([^"]+)","([^"]*)","([^"]*)","([^"]*)","([^"]*)"/); 
                if (match) {
                    const gameName = match[1];
                    const gameSource = match[2];
                    const gamePlaytime = match[5];
                    
                    if (!queue.some(g => g.name === gameName)) {
                        queue.push({ 
                            name: gameName, 
                            platform: gameSource || 'Unknown', 
                            playtime: parseFloat(gamePlaytime) || 0 
                        });
                        addedCount++;
                    }
                }
            }
            alert(`Successfully imported ${addedCount} new games!`);
            updateUI();
        };
        reader.readAsText(file);
    }

    function exportJSON() {
        const data = { queue, history, stats };
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
        triggerDownload(blob, 'backlog_tracker_backup.json');
    }

    function exportCSV() {
        if (history.length === 0) return alert("No history to export.");
        let csvContent = "Name,Decision,Platform,PlaytimeHours\n";
        history.forEach(item => {
            if (item.action !== 'skip') {
                csvContent += `"${item.game.name}","${item.action}","${item.game.platform}","${item.game.playtime}"\n`;
            }
        });
        const blob = new Blob([csvContent], {type: "text/csv"});
        triggerDownload(blob, 'backlog_results.csv');
    }

    function triggerDownload(blob, filename) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
    }

    function clearData() {
        if(confirm("Are you sure you want to delete all progress?")) {
            queue = [];
            history = [];
            stats = { done: 0, backlogged: 0 };
            updateUI();
        }
    }

    function saveData() {
        localStorage.setItem('gameQueue', JSON.stringify(queue));
        localStorage.setItem('gameHistory', JSON.stringify(history));
        localStorage.setItem('gameStats', JSON.stringify(stats));
    }

    updateUI();
</script>

</body>
</html>
